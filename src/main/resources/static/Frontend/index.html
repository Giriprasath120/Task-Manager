<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        input, button {
            margin: 5px;
            padding: 8px;
        }
        .task {
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>

<h1>Task Manager</h1>
<input type="hidden" id="taskId">
<input id="title" placeholder="Task Title">
<input id="deadline" placeholder="Deadline">
<input id="priority" placeholder="Priority">

<button onclick="addTask()">Add Task</button>

<h2>Tasks</h2>
<div id="taskList"></div>

<script src="script.js">

function loadTasks() {
    fetch("http://localhost:8080/tasks")
    .then(res => res.json())
    .then(data => {
        let output = "";
        data.forEach(task => {
            output += `
                <div class="task">
                    <p><b>${task.title}</b></p>
                    <p>${task.deadline} | ${task.priority}</p>

                    <button onclick="editTask(${task.id})">Edit</button>
                    <button onclick="deleteTask(${task.id})">Delete</button>
                </div>
            `;
        });
        document.getElementById("taskList").innerHTML = output;
    });
    
}

function addTask() {
    const task = {
        title: document.getElementById("title").value,
        deadline: document.getElementById("deadline").value,
        priority: document.getElementById("priority").value,
        completed: false
    };

    fetch("http://localhost:8080/tasks", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(task)
    })
    .then(() => loadTasks());
}

function deleteTask(id) {
    fetch(`http://localhost:8080/tasks/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        alert("Task deleted");
        loadTasks();
    });
}

function editTask(id) {
    const newTitle = prompt("Enter new title:");
    const newDeadline = prompt("Enter new deadline (YYYY-MM-DD):");
    const newPriority = prompt("Enter priority (Low/Medium/High):");

    const updatedTask = {
        title: newTitle,
        deadline: newDeadline,
        priority: newPriority,
        completed: false
    };

    fetch(`http://localhost:8080/tasks/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(updatedTask)
    })
    .then(res => res.json())
    .then(() => {
        alert("Task updated");
        loadTasks();
    });
}

loadTasks();

</script>

</body>
</html>
